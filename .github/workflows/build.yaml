name: build

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: 4.17.8
    steps:
      - uses: actions/checkout@v6
      - name: build appimage
        run: |
          sudo apt update
          sudo apt install libfuse2t64
          chmod +x build.sh
          ./build.sh ${VERSION}
      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${VERSION}" --title "Baidu Netdisk ${VERSION}" --notes "Baidu Netdisk ${VERSION}"
          gh release upload "${VERSION}" baidunetdisk-*.AppImage
